services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: theeye
      POSTGRES_PASSWORD: theeye
      POSTGRES_DB: theeye
    ports:
      - "5432:5432"
    volumes:
      - theeye_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://theeye:theeye@postgres:5432/theeye?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

volumes:
  theeye_pg:
